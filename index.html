<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valor Technologies | Premium Agency</title>
    
    <!-- Google Fonts: Space Grotesk -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --electric-blue: #00BFFF;
            --royal-cobalt: #4169E1;
            --bg-dark: #05070d;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body, html {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: #ffffff;
            font-family: 'Space Grotesk', sans-serif;
            overflow-x: hidden;
        }

        /* Premium Animated Background */
        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 191, 255, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(65, 105, 225, 0.05) 0%, transparent 40%);
            z-index: -1;
        }
    </style>
</head>    <style>
        /* CHUNK 2: HERO & NAV STYLES */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5, 7, 13, 0.5);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
        }

        .logo {
            font-weight: 700;
            font-size: 1.5rem;
            color: var(--electric-blue);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(rgba(5, 7, 13, 0.7), rgba(5, 7, 13, 0.7)), 
                        url('https://i.postimg.cc/7L01KdtT/Dark-futuristic-technology-workspace-at-202605221137.jpg');
            background-size: cover;
            background-position: center;
            padding: 0 20px;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 20px;
            background: linear-gradient(to right, #fff, var(--electric-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            color: #ccc;
            max-width: 600px;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .btn-glass {
            padding: 15px 35px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: white;
            text-decoration: none;
            border-radius: 5px;
            backdrop-filter: blur(10px);
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
        }

        .btn-glass:hover {
            background: var(--electric-blue);
            box-shadow: 0 0 20px var(--electric-blue);
            color: #000;
            border-color: var(--electric-blue);
        }

        /* CHUNK 2: AI CHATBOT UI */
        #ai-orb {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background: var(--electric-blue);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 0 0 20px var(--electric-blue);
            z-index: 2000;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 10px var(--electric-blue); }
            50% { transform: scale(1.1); box-shadow: 0 0 30px var(--electric-blue); }
            100% { transform: scale(1); box-shadow: 0 0 10px var(--electric-blue); }
        }
    </style>
</head><body>
    <!-- Animated Background Mesh -->
    <div class="bg-mesh"></div>

    <!-- Navigation -->
    <nav>
        <div class="logo">Valor Technologies</div>
        <div class="nav-links">
            <a href="#" class="btn-glass" style="padding: 10px 20px; font-size: 0.8rem;">Menu</a>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero">
        <h1>Your Vision. Our Code.<br>Infinite Possibilities.</h1>
        <p>Premium Web Development, Game Design, and AI Solutions for the next generation of elite businesses.</p>
        <div class="hero-btns">
            <a href="#" class="btn-glass">View Portfolio</a>
            <a href="https://wa.me/09123864850" class="btn-glass" style="margin-left: 15px; background: var(--electric-blue); color: black;">Hire Us</a>
        </div>
    </section>

    <!-- Valor AI Chatbot Orb -->
    <div id="ai-orb" onclick="alert('Valor AI: I am initializing. My brain is coming in the next update!')">
        <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
    </div>

    <!-- Footer -->
    <footer style="position: absolute; bottom: 20px; width: 100%; text-align: center; font-size: 0.8rem; color: rgba(255,255,255,0.3);">
        Made by <span style="color: var(--electric-blue); font-weight: bold;">Valor Technologies</span>
    </footer>
</body>
</html>
